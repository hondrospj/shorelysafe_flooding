<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ShorelySafe — Tidal Flooding Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="wrap">
    <header id="header"></header>

    <section class="grid cards" id="summary-cards"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Flood Thresholds</h2>
      </div>
      <div id="threshold-badges" class="badges"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>PETSS Forecast</h2>
      </div>
      <canvas id="forecastChart" height="120"></canvas>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Recent Crest-Anchored Events</h2>
      </div>
      <div id="recent-events-table"></div>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
