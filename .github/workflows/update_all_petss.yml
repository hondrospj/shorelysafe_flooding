name: Update All PETSS Forecasts

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */3 * * *"

permissions:
  contents: write

concurrency:
  group: update-all-petss
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate gauges
        run: node tools/validate_gauges.js

      - name: Run PETSS updater for all gauges
        run: |
          node -e '
            const fs = require("fs");
            const gauges = JSON.parse(fs.readFileSync("data/gauges.json","utf8"));
            const { execSync } = require("child_process");

            for (const g of gauges) {
              const cmd = `node tools/update_petss_forecast.js --gauge=${g.slug}`;
              console.log(cmd);
              execSync(cmd, { stdio: "inherit" });
            }
          '

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gauges/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update PETSS forecasts"
          git push
